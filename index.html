<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Economista Incómodo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; }
        .loading { color: #64748b; font-style: italic; }
        .error { color: #dc2626; background: #fee2e2; padding: 1rem; border-radius: 0.5rem; }
    </style>
</head>
<body>
    <header class="sticky top-0 z-50 bg-white border-b shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-yellow-500 to-yellow-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">E</div>
                <div>
                    <div class="font-bold text-lg text-slate-800">El Economista</div>
                    <div class="text-xs text-yellow-600 font-semibold tracking-wide">Incómodo</div>
                </div>
            </div>
        </div>
    </header>

    <div id="hero" class="bg-gradient-to-br from-blue-900 to-blue-950 text-white py-20">
        <div class="max-w-7xl mx-auto px-4">
            <h1 id="heroTitle" class="text-4xl md:text-5xl font-bold mb-4">Cargando portada...</h1>
            <p id="heroSubtitle" class="text-lg md:text-xl text-blue-200">Conectando con el contenido...</p>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <h2 class="text-2xl md:text-3xl font-bold mb-6 text-slate-800">Últimos artículos</h2>
        <div id="articlesGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            <p class="loading">Buscando artículos en GitHub...</p>
        </div>
        
        <h2 class="text-2xl md:text-3xl font-bold mt-16 mb-6 text-slate-800">Secciones</h2>
        <div id="sectionsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
            <p class="loading">Cargando secciones...</p>
        </div>
    </main>

    <footer class="bg-blue-900 text-white py-8 mt-16">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p>© 2026 El Economista Incómodo</p>
        </div>
    </footer>

    <script>
    const REPO = 'eleconomistaincomodo/el-economista-incomodo';
    const BRANCH = 'main';

    // Función segura para hacer fetch
    async function safeFetch(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status} al obtener ${url}`);
        return res;
    }

    // Parsea YAML frontmatter simple (sin librerías externas)
    function parseFrontmatter(md) {
        const lines = md.split('\n');
        if (lines[0].trim() !== '---') return { content: md };
        
        const end = lines.findIndex((l, i) => i > 0 && l.trim() === '---');
        if (end === -1) return { content: md };
        
        const meta = {};
        for (let i = 1; i < end; i++) {
            const idx = lines[i].indexOf(':');
            if (idx > 0) {
                const key = lines[i].substring(0, idx).trim().toLowerCase();
                const val = lines[i].substring(idx + 1).trim().replace(/^["']|["']$/g, '');
                meta[key] = val;
            }
        }
        meta.content = lines.slice(end + 1).join('\n').trim();
        return meta;
    }

    async function loadHero() {
        try {
            const res = await safeFetch(`https://raw.githubusercontent.com/${REPO}/${BRANCH}/content/paginas/hero.yml`);
            const text = await res.text();
            const data = parseFrontmatter(text);
            
            if (data.title) document.getElementById('heroTitle').innerHTML = data.title;
            if (data.subtitle) document.getElementById('heroSubtitle').textContent = data.subtitle;
            if (data.image) {
                document.getElementById('hero').style.backgroundImage = `linear-gradient(135deg, rgba(16,42,67,0.92), rgba(16,42,67,0.88)), url('${data.image}')`;
                document.getElementById('hero').style.backgroundSize = 'cover';
                document.getElementById('hero').style.backgroundPosition = 'center';
            }
        } catch (e) {
            console.error('Error hero:', e);
            document.getElementById('heroTitle').textContent = 'El Economista Incómodo';
            document.getElementById('heroSubtitle').textContent = 'Economía sin filtros ni agendas.';
        }
    }

    async function loadArticles() {
        const grid = document.getElementById('articlesGrid');
        try {
            // 1. Obtener lista de archivos en content/articulos
            const dirRes = await safeFetch(`https://api.github.com/repos/${REPO}/contents/content/articulos?ref=${BRANCH}`);
            const files = await dirRes.json();
            
            // 2. Filtrar solo .md
            const mdFiles = files.filter(f => f.name.endsWith('.md'));
            if (mdFiles.length === 0) {
                grid.innerHTML = '<p class="text-slate-500 col-span-3">No hay artículos publicados aún.</p>';
                return;
            }

            // 3. Cargar cada archivo
            const articles = await Promise.all(mdFiles.map(async file => {
                const res = await safeFetch(file.download_url);
                const text = await res.text();
                const meta = parseFrontmatter(text);
                return { ...meta, filename: file.name.replace('.md', '') };
            }));

            // 4. Renderizar
            grid.innerHTML = articles.map(a => `
                <div class="bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-md transition cursor-pointer border">
                    ${a.image ? `<img src="${a.image}" class="w-full h-48 object-cover" onerror="this.style.display='none'">` : '<div class="w-full h-48 bg-blue-900"></div>'}
                    <div class="p-5">
                        <h3 class="text-lg font-bold text-slate-800 mb-2">${a.title || 'Sin título'}</h3>
                        <p class="text-sm text-slate-600 mb-3 line-clamp-3">${a.excerpt || a.content?.substring(0, 120) + '...' || 'Sin resumen'}</p>
                        <div class="flex justify-between text-xs text-slate-500">
                            <span>👤 ${a.author || 'Redacción'}</span>
                            <span>📅 ${a.date || ''}</span>
                        </div>
                    </div>
                </div>
            `).join('');

        } catch (e) {
            console.error('Error artículos:', e);
            grid.innerHTML = `<div class="error col-span-3">⚠️ No se pudieron cargar los artículos. Revisa la consola (F12) para ver el error exacto: ${e.message}</div>`;
        }
    }

    function renderSections() {
        const sections = [
            { name: 'Artículos', icon: '📊' },
            { name: 'Estudios', icon: '🔬' },
            { name: 'Encuestas', icon: '📋' },
            { name: 'Videos', icon: '🎥' },
            { name: 'Podcasts', icon: '🎙️' },
            { name: 'Libros', icon: '📚' }
        ];
        document.getElementById('sectionsGrid').innerHTML = sections.map(s => `
            <div class="bg-white rounded-xl p-5 text-center shadow-sm hover:shadow-md transition cursor-pointer border">
                <div class="text-3xl mb-2">${s.icon}</div>
                <div class="font-semibold text-slate-700 text-sm">${s.name}</div>
            </div>
        `).join('');
    }

    // Iniciar todo
    async function init() {
        console.log('🚀 Iniciando carga de contenido desde GitHub...');
        await Promise.all([loadHero(), loadArticles()]);
        renderSections();
        console.log('✅ Carga completada.');
    }

    document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
