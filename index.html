<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Economista Incómodo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { background: #f8fafc; }
    </style>
</head>
<body class="bg-slate-50">
    <header class="sticky top-0 z-50 bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-yellow-500 to-yellow-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">E</div>
                <div>
                    <div class="font-bold text-lg">El Economista</div>
                    <div class="text-xs text-yellow-600 font-semibold tracking-wide">Incómodo</div>
                </div>
            </div>
        </div>
    </header>

    <div id="heroSection" class="bg-gradient-to-br from-blue-900 to-blue-950 text-white py-20">
        <div class="max-w-7xl mx-auto px-4">
            <h1 id="heroTitle" class="text-5xl font-bold mb-4">Cargando...</h1>
            <p id="heroSubtitle" class="text-xl text-blue-200">Cargando...</p>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <h2 class="text-3xl font-bold mb-8">Últimos artículos</h2>
        <div id="articlesGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            <p class="text-gray-500">Cargando artículos...</p>
        </div>
        
        <h2 class="text-3xl font-bold mt-16 mb-8">Secciones</h2>
        <div id="sectionsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
            <p class="text-gray-500">Cargando secciones...</p>
        </div>
    </main>

    <footer class="bg-blue-900 text-white py-8 mt-16">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p>© 2026 El Economista Incómodo</p>
        </div>
    </footer>

    <script>
    const GITHUB_REPO = 'eleconomistaincomodo/el-economista-incomodo';
    const GITHUB_BRANCH = 'main';

    async function loadAllContent() {
        try {
            // Cargar hero
            const heroResponse = await fetch(`https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/content/paginas/hero.yml`);
            if (heroResponse.ok) {
                const heroText = await heroResponse.text();
                const hero = jsyaml.load(heroText);
                if (hero.title) document.getElementById('heroTitle').innerHTML = hero.title;
                if (hero.subtitle) document.getElementById('heroSubtitle').textContent = hero.subtitle;
                if (hero.image) {
                    document.getElementById('heroSection').style.backgroundImage = `linear-gradient(135deg,rgba(16,42,67,0.9),rgba(16,42,67,0.85)),url('${hero.image}')`;
                    document.getElementById('heroSection').style.backgroundSize = 'cover';
                    document.getElementById('heroSection').style.backgroundPosition = 'center';
                }
            }

            // Cargar artículos
            await loadArticles();
            
            // Cargar secciones
            renderSections();

        } catch (error) {
            console.error('Error:', error);
            document.getElementById('heroTitle').textContent = 'Error cargando contenido';
        }
    }

    async function loadArticles() {
        try {
            const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/content/articulos?ref=${GITHUB_BRANCH}`);
            if (!response.ok) {
                document.getElementById('articlesGrid').innerHTML = '<p class="text-gray-500">No hay artículos aún</p>';
                return;
            }
            
            const files = await response.json();
            const articles = [];
            
            for (const file of files) {
                if (file.name.endsWith('.md')) {
                    const articleResponse = await fetch(file.download_url);
                    if (articleResponse.ok) {
                        const text = await articleResponse.text();
                        const article = parseYAMLContent(text);
                        if (article) {
                            article.id = file.name.replace('.md', '');
                            articles.push(article);
                        }
                    }
                }
            }
            
            renderArticles(articles);
        } catch (error) {
            console.error('Error loading articles:', error);
            document.getElementById('articlesGrid').innerHTML = '<p class="text-gray-500">Error cargando artículos</p>';
        }
    }

    function parseYAMLContent(text) {
        const lines = text.split('\n');
        const result = {};
        let inFrontmatter = false;
        let contentStart = -1;
        
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].trim() === '---') {
                if (!inFrontmatter) {
                    inFrontmatter = true;
                } else {
                    contentStart = i + 1;
                    break;
                }
            } else if (inFrontmatter) {
                const colonIndex = lines[i].indexOf(':');
                if (colonIndex > 0) {
                    const key = lines[i].substring(0, colonIndex).trim();
                    const value = lines[i].substring(colonIndex + 1).trim();
                    result[key] = value;
                }
            }
        }
        
        if (contentStart > 0) {
            result.body = lines.slice(contentStart).join('\n').trim();
        }
        
        return Object.keys(result).length > 0 ? result : null;
    }

    function renderArticles(articles) {
        const grid = document.getElementById('articlesGrid');
        if (articles.length === 0) {
            grid.innerHTML = '<p class="text-gray-500">No hay artículos aún</p>';
            return;
        }
        
        grid.innerHTML = articles.map(article => `
            <div class="bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-lg transition-all cursor-pointer">
                ${article.image ? `<img src="${article.image}" class="w-full h-48 object-cover" onerror="this.style.display='none'">` : '<div class="w-full h-48 bg-blue-900"></div>'}
                <div class="p-6">
                    <h3 class="text-lg font-bold mb-2">${article.title || 'Sin título'}</h3>
                    <p class="text-sm text-gray-600 mb-4">${article.excerpt || ''}</p>
                    <div class="flex items-center justify-between text-xs text-gray-500">
                        <span>👤 ${article.author || 'Anónimo'}</span>
                        <span>📅 ${article.date || ''}</span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function renderSections() {
        const sections = [
            {id:'articulos',name:'Artículos',icon:'📊'},
            {id:'estudios',name:'Estudios',icon:'🔬'},
            {id:'encuestas',name:'Encuestas',icon:'📋'},
            {id:'videos',name:'Videos',icon:'🎥'},
            {id:'podcast',name:'Podcasts',icon:'🎙️'},
            {id:'libros',name:'Libros',icon:'📚'}
        ];
        
        const grid = document.getElementById('sectionsGrid');
        grid.innerHTML = sections.map(section => `
            <div class="bg-white rounded-xl p-6 text-center shadow-sm hover:shadow-lg transition-all cursor-pointer">
                <div class="text-4xl mb-3">${section.icon}</div>
                <h3 class="font-semibold text-sm">${section.name}</h3>
            </div>
        `).join('');
    }

    document.addEventListener('DOMContentLoaded', loadAllContent);
    </script>
</body>
</html>
